name: VoiceProbe
options:
  bundleIdPrefix: dev.edgeprobe.demo
  deploymentTarget:
    iOS: "16.4"
  developmentLanguage: en
  createIntermediateGroups: true

# SPM deps: the local EdgeProbe SDK by relative path + MLX-Swift-Examples
# from GitHub. mlx-swift-examples re-exports MLX/MLXNN/MLXLLM/MLXLMCommon,
# so depending on it transitively pulls everything we need for on-device Llama.
#
# swift-transformers is also pulled in transitively by mlx-swift-examples, but
# we declare it explicitly here so the simulator-only CoreML LLM path (opt-in
# via `-EDGEPROBE_SIM_COREML`) can `import Hub` and `import Tokenizers`
# without depending on mlx-swift-examples's re-export surface (which is
# limited to the `Transformers` umbrella product). The version constraint
# matches what mlx-swift-examples resolves to; SPM will dedupe.
packages:
  EdgeProbe:
    path: ..
  # LlamaRuntime: a thin Swift wrapper around the upstream llama.cpp
  # XCFramework. Lives in a sibling SwiftPM package (`../LlamaRuntime`)
  # rather than being folded into EdgeProbe so backend/CI consumers of
  # the SDK don't pay the 169 MB binaryTarget download. VoiceProbe uses
  # it only on simulator under the `-EDGEPROBE_SIM_LLAMACPP` launch
  # arg — a real on-device GGUF-backed LLM path that bypasses the
  # CoreML zero-logit bug described in the VoiceProbe README.
  LlamaRuntime:
    path: ../LlamaRuntime
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    # Pin to a recent tag — mlx-swift-examples ships frequently and their API
    # surface (LLMRegistry names, processor prepare shape) has evolved. Update
    # this pin if you want to track HEAD; the README notes what to patch.
    from: "2.21.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    # 1.0.0 is the first stable release and what mlx-swift-examples pins to.
    # The simulator-only CoreML LLM path (ModelHub + LLMService, opt-in via
    # `-EDGEPROBE_SIM_COREML`) uses `HubApi.snapshot` for weight download
    # and `AutoTokenizer.from(modelFolder:)` + chat-template apply for
    # tokenization. The inference loop itself drives `MLModel` + `MLState`
    # directly — swift-transformers' `LanguageModel` wrapper hard-codes
    # camelCase CoreML input names and doesn't match the finnvoorhees
    # SmolLM2 export (snake_case `input_ids` / `causal_mask`), so we bypass
    # it. iOS 18 runtime guard is applied at the call sites.
    #
    # The `-EDGEPROBE_SIM_LLAMACPP` path (Slice 11) also uses `HubApi`
    # from this package to pull a GGUF file from Qwen's HF repo — we
    # reuse swift-transformers rather than hand-rolling a downloader.
    from: "1.0.0"

targets:
  VoiceProbe:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: VoiceProbe
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "VoiceProbe records audio so Apple's on-device Speech framework can transcribe what you say. Audio never leaves your device."
        NSSpeechRecognitionUsageDescription: "VoiceProbe transcribes your voice on-device via SFSpeechRecognizer so a local Llama model can respond. Nothing is sent to Apple's servers."
        # Plaintext loopback so you can point at http://127.0.0.1:3000 during
        # development without running a TLS proxy. Tighten or remove when you
        # point VoiceProbe at a real backend.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # These keys are read by Config.swift. Override in an .xcconfig or via
        # an Xcode build scheme environment variable when you move off localhost.
        EDGEPROBE_BACKEND_URL: "$(EDGEPROBE_BACKEND_URL)"
        EDGEPROBE_WEB_URL: "$(EDGEPROBE_WEB_URL)"
        EDGEPROBE_API_KEY: "$(EDGEPROBE_API_KEY)"
        EDGEPROBE_DASHBOARD_KEY: "$(EDGEPROBE_DASHBOARD_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.edgeprobe.demo.VoiceProbe
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only; MLX-Llama is a lot to ask of an iPad too
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.4"
        ENABLE_PREVIEWS: YES
        # Defaults wired through the Info.plist; users can override by
        # exporting these before `xcodegen generate`.
        EDGEPROBE_BACKEND_URL: "http://127.0.0.1:3000"
        EDGEPROBE_WEB_URL: "http://127.0.0.1:3001"
        EDGEPROBE_API_KEY: "epk_pub_demo_voiceprobe"
        # Must match one of the keys the backend launches with in its
        # DASHBOARD_KEYS env var. The value below matches the test default
        # so `bun run start` + VoiceProbe "just works" against a fresh clone.
        EDGEPROBE_DASHBOARD_KEY: "epk_dash_acme_test_0000000000000000"
    dependencies:
      - package: EdgeProbe
        product: EdgeProbe
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
      # CoreML LLM path (simulator, opt-in). `Transformers` bundles
      # Tokenizers + Generation + Models; `Hub` is a separate product for
      # HubApi snapshot download + local cache management. Device builds
      # still pay the link cost for these, but the code behind them is
      # all gated by `#if targetEnvironment(simulator)` so nothing
      # executes on device. Within sim, the path is further gated by the
      # `-EDGEPROBE_SIM_COREML` launch arg; default sim builds use a
      # stub that doesn't touch either symbol. See README VoiceProbe
      # section for why the default is the stub.
      - package: swift-transformers
        product: Transformers
      - package: swift-transformers
        product: Hub
      # llama.cpp simulator LLM (Slice 11). Only referenced from code
      # behind `#if targetEnvironment(simulator)` and further gated by
      # the `-EDGEPROBE_SIM_LLAMACPP` launch arg. Device builds link it
      # but never execute it; the xcframework dead-strips easily since
      # no device-path code touches any LlamaRuntime symbol.
      - package: LlamaRuntime
        product: LlamaRuntime
