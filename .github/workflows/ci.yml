name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when a new commit arrives.
# Day-1 quality-of-life so we don't burn credits on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS SDK — swift test
    runs-on: macos-14
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Pin to a known-current Xcode. The CI matrix described in
        # docs/TEST-PLAN.md (current + current-1) lands in month 13 once the
        # XCFramework build job exists.
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ios/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel

  backend:
    name: Backend — bun test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  web:
    name: Web — bun test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  action:
    name: Action — bun test + typecheck + golden fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The Action's smoke test imports from ../backend/src, so a fresh checkout
    # carries both packages. Its own tests are self-contained (in-memory
    # backend, no network), so we don't need a live Postgres.
    defaults:
      run:
        working-directory: action
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install action deps
        run: bun install --frozen-lockfile

      - name: Install backend deps (required by smoke.test.ts cross-package import)
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Self-invoke on fixture (dry-run, verifies action.yml wiring)
        run: |
          bun run src/entry.ts \
            --trace fixtures/trace.sample.json \
            --baseline fixtures/baseline.sample.json \
            --threshold 0.15 \
            --fail-on-regression false \
            --org org_acme --project proj_ci \
            --dry-run

  # ──────────────────────────────────────────────────────────────────────
  # Critical Paths — the six ship-gating invariants from docs/TEST-PLAN.md.
  #
  # These run in their OWN jobs (not buried inside `ios`/`backend`) so a
  # reviewer glancing at PR status sees them as discrete green/red signals.
  # They're fast — the backend suite is ~150ms, the iOS one is ~3ms — so a
  # regression here surfaces before the broader suites finish installing.
  # Both feed into `required` as first-class dependencies.
  #
  # Canonical file locations (kept in lockstep):
  #   - backend/test/critical-paths.test.ts     (invariants #1, #2, #3)
  #   - ios/Tests/EdgeProbeTests/CriticalPathsTests.swift  (#4, #5, #6)
  # ──────────────────────────────────────────────────────────────────────
  critical-paths-backend:
    name: Critical Paths — backend (invariants #1–#3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run critical-paths suite only
        # Single-file gate — if this fails, the branch cannot ship.
        run: bun test test/critical-paths.test.ts

  critical-paths-ios:
    name: Critical Paths — iOS (invariants #4–#6)
    runs-on: macos-14
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ios/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-critical-${{ runner.os }}-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-
      - name: Run CriticalPathsTests only
        run: swift test --filter CriticalPathsTests

  e2e:
    name: End-to-end — scripts/e2e.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # e2e now exercises both the backend API and the web dashboard HTML, so it
    # waits on both jobs and installs deps in both packages before booting.
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Install web deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run e2e smoke
        run: ./scripts/e2e.sh

  # Aggregate check — GitHub branch protection points at this name.
  # Add new jobs above; add their name to `needs` to make merge-blocking.
  required:
    name: All checks
    runs-on: ubuntu-latest
    needs:
      - ios
      - backend
      - web
      - action
      - e2e
      - critical-paths-backend
      - critical-paths-ios
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          failed=0
          for job in ios backend web action e2e critical-paths-backend critical-paths-ios; do
            case "$job" in
              ios)                     result="${{ needs.ios.result }}" ;;
              backend)                 result="${{ needs.backend.result }}" ;;
              web)                     result="${{ needs.web.result }}" ;;
              action)                  result="${{ needs.action.result }}" ;;
              e2e)                     result="${{ needs.e2e.result }}" ;;
              critical-paths-backend)  result="${{ needs['critical-paths-backend'].result }}" ;;
              critical-paths-ios)      result="${{ needs['critical-paths-ios'].result }}" ;;
            esac
            echo "  $job: $result"
            if [ "$result" != "success" ]; then failed=1; fi
          done
          if [ "$failed" = "1" ]; then
            echo "Required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
