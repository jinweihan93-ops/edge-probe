name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when a new commit arrives.
# Day-1 quality-of-life so we don't burn credits on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS SDK — swift test
    runs-on: macos-14
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Pin to a known-current Xcode. The CI matrix described in
        # docs/TEST-PLAN.md (current + current-1) lands in month 13 once the
        # XCFramework build job exists.
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ios/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel

  backend:
    name: Backend — bun test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  e2e:
    name: End-to-end — scripts/e2e.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Run e2e smoke
        run: ./scripts/e2e.sh

  # Aggregate check — GitHub branch protection points at this name.
  # Add new jobs above; add their name to `needs` to make merge-blocking.
  required:
    name: All checks
    runs-on: ubuntu-latest
    needs: [ios, backend, e2e]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          failed=0
          for job in ios backend e2e; do
            result_var="${job}_result"
            case "$job" in
              ios)     result="${{ needs.ios.result }}" ;;
              backend) result="${{ needs.backend.result }}" ;;
              e2e)     result="${{ needs.e2e.result }}" ;;
            esac
            echo "  $job: $result"
            if [ "$result" != "success" ]; then failed=1; fi
          done
          if [ "$failed" = "1" ]; then
            echo "Required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
