name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when a new commit arrives.
# Day-1 quality-of-life so we don't burn credits on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS SDK — swift test (Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    timeout-minutes: 15
    # Slice 13: matrix across Xcode current + current-1 so Apple's monthly
    # image rotations surface as a discrete red cell instead of silently
    # shifting the swift compiler underfoot. Rationale for the two picks:
    #   • "16.1" — explicit current-1. When Apple rotates it off the macos-14
    #     image, THIS cell fails, we read the release notes, and we update
    #     the pin deliberately. Without the explicit pin we'd learn about
    #     the drop the day we accept a regression.
    #   • "16"   — latest 16.x via maxim-lobanov/setup-xcode's major-selector.
    #     Tracks patch bumps automatically so we don't churn this file on
    #     every 16.2.1 → 16.2.2 refresh, but still catches Swift 6.x
    #     compiler changes inside the major.
    # When a fresh major (17.x) lands, add it as a new cell rather than
    # replacing — the whole point is drift detection, not aggressive forward
    # motion.
    strategy:
      fail-fast: false
      matrix:
        xcode: ["16.1", "16"]
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        # See the matrix comment above for why we pin two specific values
        # rather than hard-coding one. The action resolves "16" to whatever
        # the newest 16.x installed on the runner is.
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v5
        with:
          path: |
            ios/.build
            ~/Library/Caches/org.swift.swiftpm
          # Scope the cache key to the Xcode version so matrix cells don't
          # clobber each other. Without this, cell B's 16.1 build can
          # restore cell A's 16.2 .build/ and fail with a cryptic module
          # incompatibility error.
          key: swiftpm-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode-${{ matrix.xcode }}-
            swiftpm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        # --enable-code-coverage only on the "16" cell — coverage output is
        # identical across Xcode patch levels (same Swift 6.x compiler), so
        # running it on both matrix cells would just duplicate a ~30 KB
        # LCOV artifact. Text summary below parses llvm-cov's stdout so the
        # PR log shows a one-liner per source file without the reviewer
        # having to download the artifact.
        run: |
          if [ "${{ matrix.xcode }}" = "16" ]; then
            swift test --parallel --enable-code-coverage
          else
            swift test --parallel
          fi

      - name: Export iOS SDK coverage (LCOV + text summary)
        # Only runs on the "16" cell (see `if:` below). Skipped on 16.1 so
        # we don't fight over artifact names in the matrix.
        if: ${{ matrix.xcode == '16' }}
        run: |
          set -euo pipefail
          BIN=".build/arm64-apple-macosx/debug/EdgeProbePackageTests.xctest/Contents/MacOS/EdgeProbePackageTests"
          PROF=".build/arm64-apple-macosx/debug/codecov/default.profdata"
          if [ ! -f "$PROF" ]; then
            echo "No profdata at $PROF — did --enable-code-coverage run?"
            exit 1
          fi
          mkdir -p coverage
          # Exclude generated Swift Testing runners and test sources —
          # coverage of TEST code isn't meaningful. The regex matches
          # `.build/` (derived sources) and `Tests/` (the XCTest/Testing
          # targets). Keep Sources/EdgeProbe/*.
          xcrun llvm-cov export "$BIN" \
            -instr-profile "$PROF" \
            -format=lcov \
            -ignore-filename-regex='.build|Tests|Fixtures' \
            > coverage/lcov.info
          echo "── iOS SDK coverage summary ──────────────"
          xcrun llvm-cov report "$BIN" \
            -instr-profile "$PROF" \
            -ignore-filename-regex='.build|Tests|Fixtures' \
            | tee coverage/summary.txt
          echo "──────────────────────────────────────────"

      - name: Upload iOS SDK coverage artifact
        if: ${{ matrix.xcode == '16' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ios-sdk
          path: ios/coverage/
          retention-days: 14
          if-no-files-found: error

      - name: VoiceProbe stub reply stability (Slice 10)
        # Compiles ios/DemoApp/Sources/Services/SimulatorStubReply.swift
        # against an in-line driver and asserts the canonical output for
        # "hello" (plus 3 edge cases). Cheap — pure swiftc + a tiny
        # binary — but pins the -EDGEPROBE_AUTOGENERATE output contract
        # without needing to boot a simulator or link MLX.
        working-directory: ${{ github.workspace }}
        run: bash scripts/voiceprobe-stub-smoke.sh

  backend:
    name: Backend — bun test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (with coverage)
        # Both text + lcov reporters — text lands in the PR log for
        # scanability, lcov lands on disk for the artifact + any downstream
        # Codecov/Coveralls integration later. Slice 14 ships observability
        # only; threshold gating is a follow-up once the baseline numbers
        # have run for a week without surprise red cells.
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          path: backend/coverage/
          retention-days: 14
          if-no-files-found: error

  web:
    name: Web — bun test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (with coverage)
        # See `backend` job for the reporter choice rationale.
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov

      - name: Upload web coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-web
          path: web/coverage/
          retention-days: 14
          if-no-files-found: error

  action:
    name: Action — bun test + typecheck + golden fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The Action's smoke test imports from ../backend/src, so a fresh checkout
    # carries both packages. Its own tests are self-contained (in-memory
    # backend, no network), so we don't need a live Postgres.
    defaults:
      run:
        working-directory: action
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install action deps
        run: bun install --frozen-lockfile

      - name: Install backend deps (required by smoke.test.ts cross-package import)
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (with coverage)
        # See `backend` job for the reporter choice rationale.
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov

      - name: Upload action coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-action
          path: action/coverage/
          retention-days: 14
          if-no-files-found: error

      - name: Self-invoke on fixture (dry-run, verifies action.yml wiring)
        run: |
          bun run src/entry.ts \
            --trace fixtures/trace.sample.json \
            --baseline fixtures/baseline.sample.json \
            --threshold 0.15 \
            --fail-on-regression false \
            --org org_acme --project proj_ci \
            --dry-run

  # ──────────────────────────────────────────────────────────────────────
  # Critical Paths — the six ship-gating invariants from docs/TEST-PLAN.md.
  #
  # These run in their OWN jobs (not buried inside `ios`/`backend`) so a
  # reviewer glancing at PR status sees them as discrete green/red signals.
  # They're fast — the backend suite is ~150ms, the iOS one is ~3ms — so a
  # regression here surfaces before the broader suites finish installing.
  # Both feed into `required` as first-class dependencies.
  #
  # Canonical file locations (kept in lockstep):
  #   - backend/test/critical-paths.test.ts     (invariants #1, #2, #3)
  #   - ios/Tests/EdgeProbeTests/CriticalPathsTests.swift  (#4, #5, #6)
  # ──────────────────────────────────────────────────────────────────────
  critical-paths-backend:
    name: Critical Paths — backend (invariants #1–#3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run critical-paths suite only
        # Single-file gate — if this fails, the branch cannot ship.
        run: bun test test/critical-paths.test.ts

  critical-paths-ios:
    name: Critical Paths — iOS (invariants #4–#6, Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    timeout-minutes: 10
    # Ship-gating invariants; matrix-matches the `ios` job above so a
    # ship-blocker surfacing only under current-1 Xcode is impossible.
    # Duplication against `ios` is the point — docs/TEST-PLAN.md calls
    # these out as the reviewer-facing roll-up of the six critical paths.
    strategy:
      fail-fast: false
      matrix:
        xcode: ["16.1", "16"]
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        # See the matrix comment in the `ios` job for the picking logic.
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Cache SwiftPM artifacts
        uses: actions/cache@v5
        with:
          path: |
            ios/.build
            ~/Library/Caches/org.swift.swiftpm
          # Per-Xcode-version key so matrix cells don't overwrite each
          # other (see identical note in the `ios` job).
          key: swiftpm-critical-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            swiftpm-critical-${{ runner.os }}-xcode-${{ matrix.xcode }}-
            swiftpm-${{ runner.os }}-
      - name: Run CriticalPathsTests only
        run: swift test --filter CriticalPathsTests

  # Benchmark harness (Slice 9). Own job so a format drift in the goldens
  # surfaces as a discrete red signal rather than getting buried in the main
  # iOS suite. Depends on ../ios via a local path dep — so the iOS source
  # still has to be present, but we run `swift test` scoped to the harness
  # package only.
  harness:
    name: Harness — swift test (run + diff goldens, Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    timeout-minutes: 10
    # Harness has a local path dep on ../ios so it effectively re-compiles
    # the SDK. Running it against both Xcode cells catches drift in
    # library-evolution or resilience-boundary corners that the plain
    # `swift test` suite might miss (different compilation mode).
    strategy:
      fail-fast: false
      matrix:
        xcode: ["16.1", "16"]
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        # See the matrix comment in the `ios` job for the picking logic.
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Cache SwiftPM artifacts
        uses: actions/cache@v5
        with:
          path: |
            harness/.build
            ~/Library/Caches/org.swift.swiftpm
          # Per-Xcode-version key so matrix cells don't overwrite each
          # other (see identical note in the `ios` job).
          key: swiftpm-harness-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('harness/Package.swift','ios/Package.swift') }}
          restore-keys: |
            swiftpm-harness-${{ runner.os }}-xcode-${{ matrix.xcode }}-
            swiftpm-harness-${{ runner.os }}-
      - name: Build harness executable
        run: swift build
      - name: Smoke-run the CLI on a committed prompt fixture
        # The contract from docs/SLICES.md §Slice 9 "Done" — this exact
        # invocation must produce a JSON timing blob. We parse with Ruby
        # (pre-installed on macos-14 runners) rather than bun/jq so the
        # job has zero setup deps beyond Xcode.
        run: |
          swift run harness run \
            --model mock-v1 \
            --prompt Tests/harnessTests/Fixtures/prompts/cap.txt \
            --iters 2 | tee /tmp/harness-smoke.json
          # Output must parse as JSON with non-empty runs[].
          ruby -rjson -e '
            b = JSON.parse(File.read("/tmp/harness-smoke.json"))
            raise "runs[] missing or empty" unless b["runs"].is_a?(Array) && !b["runs"].empty?
            raise "schema field missing" unless b["schema"]
            puts "harness smoke OK — #{b["runs"].length} iterations, schema v#{b["schema"]}"
          '
      - name: Run harness test suite
        run: swift test

  e2e:
    name: End-to-end — scripts/e2e.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # e2e now exercises both the backend API and the web dashboard HTML, so it
    # waits on both jobs and installs deps in both packages before booting.
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Install web deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run e2e smoke
        run: ./scripts/e2e.sh

  # Aggregate check — GitHub branch protection points at this name.
  # Add new jobs above; add their name to `needs` to make merge-blocking.
  required:
    name: All checks
    runs-on: ubuntu-latest
    needs:
      - ios
      - backend
      - web
      - action
      - e2e
      - critical-paths-backend
      - critical-paths-ios
      - harness
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          failed=0
          for job in ios backend web action e2e critical-paths-backend critical-paths-ios harness; do
            case "$job" in
              ios)                     result="${{ needs.ios.result }}" ;;
              backend)                 result="${{ needs.backend.result }}" ;;
              web)                     result="${{ needs.web.result }}" ;;
              action)                  result="${{ needs.action.result }}" ;;
              e2e)                     result="${{ needs.e2e.result }}" ;;
              critical-paths-backend)  result="${{ needs['critical-paths-backend'].result }}" ;;
              critical-paths-ios)      result="${{ needs['critical-paths-ios'].result }}" ;;
              harness)                 result="${{ needs.harness.result }}" ;;
            esac
            echo "  $job: $result"
            if [ "$result" != "success" ]; then failed=1; fi
          done
          if [ "$failed" = "1" ]; then
            echo "Required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
